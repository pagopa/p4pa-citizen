openapi: 3.0.1
info:
  title: Fake API
  description: "Sample API"
  version: "1.0.0"
servers:
  - url: "http://localhost:8080"
    description: Generated server url
paths:
  /api/v1/greet:
    get:
      summary: "Hello World"
      description: "Sample endpoint that return greetings"
      responses:
        '200':
          description: "Success"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Hello, World!"
        '500':
          description: "Internal Server Error"
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Internal Server Error"
  /brokers/{brokerId}/organizations/spontaneous:
    get:
      tags:
        - Organization
      summary: "Retrieves the list of organizations with at least one dpto with flagSpontaneous and flagActive set to true"
      operationId: getOrganizationsWithSpontaneous
      parameters:
        - name: brokerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrganizationsWithSpontaneousDTO"
        '401':
          description: Unauthorized - Missing or invalid token
        '403':
          description: Forbidden - Access denied
        '500':
          description: Internal Server Error
  /brokers/{brokerId}/organizations/spontaneous/{organizationId}/debt-position-type-orgs:
    get:
      tags:
        - DebtPositionTypeOrg
      summary: "Retrieves the list of debtPositionTypeOrg with flagSpontaneous and flagActive set to true"
      operationId: getDebtPositionTypeOrgsWithSpontaneous
      parameters:
        - name: brokerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DebtPositionTypeOrgsWithSpontaneousDTO"
        '401':
          description: Unauthorized - Missing or invalid token
        '403':
          description: Forbidden - Access denied
        '500':
          description: Internal Server Error
security:
  - BearerAuth: [ ]
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    OrganizationsWithSpontaneousDTO:
      type: object
      required:
        - organizationId
        - orgName
        - orgFiscalCode
        - ipaCode
      properties:
        organizationId:
          type: integer
          format: int64
        orgName:
          type: string
        orgFiscalCode:
          type: string
        ipaCode:
          type: string
    DebtPositionTypeOrgsWithSpontaneousDTO:
      type: object
      required:
        - debtPositionTypeOrgId
        - organizationId
        - code
        - description
      properties:
        debtPositionTypeOrgId:
          type: integer
          format: int64
        organizationId:
          type: integer
          format: int64
        code:
          type: string
        description:
          type: string
    ErrorDTO:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - NOT_FOUND
            - BAD_REQUEST
            - GENERIC_ERROR
        message:
          type: string
